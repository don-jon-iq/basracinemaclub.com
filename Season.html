  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <script>
  // ---- Fetch seasons from API and render ----
  (async function() {
    const seasonNumbers = ['One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten'];

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('span');
      d.textContent = str;
      return d.innerHTML;
    }

    let seasons = [];
    try {
      const res = await fetch('/api/seasons');
      seasons = await res.json();
    } catch (e) {
      console.error('Failed to load seasons:', e);
      return;
    }

    // Build nav
    const nav = document.getElementById('seasonsNav');
    nav.innerHTML = seasons.map((s, i) => {
      const shortLabel = `S${i + 1} · ${s.country.split(' ')[0]}`;
      return `<a href="#season-${s.id}" class="sn-item">${esc(shortLabel)}</a>`;
    }).join('');

    // Build sections
    const container = document.getElementById('seasonsContainer');
    container.innerHTML = seasons.map((s, i) => {
      const num = seasonNumbers[i] || (i + 1);
      const isRetro = s.type === 'director-retrospective';
      const altClass = i % 2 === 1 ? ' alt' : '';
      const retroClass = isRetro ? ' retro-section' : '';

      // Season title: split on first word for styling
      const titleWords = s.title.split(' ');
      const titleFirst = titleWords[0];
      const titleRest = titleWords.slice(1).join(' ');
      const titleHtml = titleRest
        ? `${esc(titleFirst)}<br><em>${esc(titleRest)}</em>`
        : `<em>${esc(titleFirst)}</em>`;

      let contentHtml = '';

      if (isRetro && s.directors && s.directors.length > 0) {
        const directorCards = s.directors.map(d => {
          const dirFilmsHtml = (d.films || []).map(df => `
            <div class="dir-film">
              <img src="${esc(df.poster_image)}" alt="${esc(df.title)}">
              <div class="dir-film-info">
                <h4>${esc(df.title)}</h4>
                <span>${esc(df.year)}</span>
                <p>${esc(df.description)}</p>
              </div>
            </div>
          `).join('');

          return `
            <div class="director-card">
              <div class="director-portrait">
                <img src="${esc(d.portrait_image)}" alt="${esc(d.name)}">
                <div class="director-portrait-overlay"></div>
              </div>
              <div class="director-content">
                <h3 class="director-name">${esc(d.name)}</h3>
                <p class="director-bio">${esc(d.bio)}</p>
                <div class="director-films">${dirFilmsHtml}</div>
              </div>
            </div>
          `;
        }).join('');
        contentHtml = `<div class="director-track">${directorCards}</div>`;
      } else if (s.films && s.films.length > 0) {
        const filmCards = s.films.map(f => `
          <div class="film-card">
            <div class="film-poster"><img src="${esc(f.poster_image)}" alt="${esc(f.title)}"></div>
            <div class="film-info">
              <div class="film-decade">${esc(f.year_decade)}</div>
              <h3 class="film-title">${esc(f.title)}</h3>
              <p class="film-director">By ${esc(f.director)}</p>
              <p class="film-desc">${esc(f.description)}</p>
            </div>
          </div>
        `).join('');
        contentHtml = `<div class="film-track">${filmCards}</div>`;
      }

      return `
        <section class="season-section${altClass}${retroClass}" id="season-${s.id}">
          <div class="season-header">
            <div class="season-meta">
              <span class="season-num">Season ${esc(String(num))}</span>
              <span class="season-divider">&middot;</span>
              <span class="season-country">${esc(s.country)}</span>
            </div>
            <h2 class="season-title">${titleHtml}</h2>
            <p class="season-desc">${esc(s.description)}</p>
          </div>
          ${contentHtml}
        </section>
      `;
    }).join('');

    // ---- Initialize animations (same as season.js) ----
    initAnimations(seasons);
  })();

  function initAnimations(seasons) {
    gsap.registerPlugin(ScrollTrigger);

    const isMobile = window.innerWidth < 768;
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Page hero entrance
    if (prefersReduced) {
      gsap.set(['.page-hero-title', '.page-hero-desc', '.seasons-nav'], { opacity: 1, y: 0 });
    } else {
      gsap.timeline({ delay: 0.35 })
        .to('.page-hero-title', { opacity: 1, y: 0, duration: 1, ease: 'power3.out' })
        .to('.page-hero-desc',  { opacity: 1, duration: 0.7, ease: 'power2.out' }, '-=0.5')
        .to('.seasons-nav',     { opacity: 1, duration: 0.6, ease: 'power2.out' }, '-=0.3');
    }

    // Season titles + descs
    document.querySelectorAll('.season-title').forEach(el => {
      gsap.to(el, {
        scrollTrigger: { trigger: el, start: 'top 88%' },
        opacity: 1, y: 0, duration: 0.8, ease: 'power3.out',
      });
    });
    document.querySelectorAll('.season-desc').forEach(el => {
      gsap.to(el, {
        scrollTrigger: { trigger: el, start: 'top 88%' },
        opacity: 1, duration: 0.7, delay: 0.15, ease: 'power2.out',
      });
    });

    // Film cards stagger
    document.querySelectorAll('.film-track').forEach(track => {
      const cards = track.querySelectorAll('.film-card');
      gsap.from(cards, {
        scrollTrigger: { trigger: track, start: 'top 88%' },
        opacity: 0, x: 30,
        duration: 0.5, stagger: 0.08,
        ease: 'power2.out',
      });
    });

    // Director track nav buttons
    const directorTrack = document.querySelector('.director-track');
    if (directorTrack) {
      const cards = directorTrack.querySelectorAll('.director-card');
      const dirNames = [];
      seasons.forEach(s => {
        if (s.type === 'director-retrospective' && s.directors) {
          s.directors.forEach(d => {
            // Short label for nav
            const parts = d.name.split(' ');
            dirNames.push(parts.length > 1 ? parts[parts.length - 1] : d.name);
          });
        }
      });

      const navWrap = document.createElement('div');
      navWrap.className = 'director-nav';
      dirNames.forEach((name, i) => {
        const btn = document.createElement('button');
        btn.className = 'director-nav-btn' + (i === 0 ? ' active' : '');
        btn.textContent = name;
        btn.addEventListener('click', () => {
          const card = cards[i];
          if (!card) return;
          directorTrack.scrollTo({ left: card.offsetLeft, behavior: 'smooth' });
          document.querySelectorAll('.director-nav-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
        navWrap.appendChild(btn);
      });
      directorTrack.after(navWrap);

      directorTrack.addEventListener('scroll', () => {
        const center = directorTrack.scrollLeft + directorTrack.clientWidth / 2;
        let closest = 0, minDist = Infinity;
        cards.forEach((card, i) => {
          const dist = Math.abs(card.offsetLeft + card.offsetWidth / 2 - center);
          if (dist < minDist) { minDist = dist; closest = i; }
        });
        document.querySelectorAll('.director-nav-btn').forEach((b, i) => {
          b.classList.toggle('active', i === closest);
        });
      }, { passive: true });
    }

    // Nav compact on scroll
    ScrollTrigger.create({
      start: 'top -60px',
      onUpdate: (self) => {
        document.querySelector('.nav').style.padding =
          self.direction === 1 ? '10px var(--pad)' : '16px var(--pad)';
      }
    });

    // Seasons nav highlight
    document.querySelectorAll('.season-section').forEach((section, i) => {
      ScrollTrigger.create({
        trigger: section,
        start: 'top 55%',
        end: 'bottom 45%',
        onToggle: self => {
          if (!self.isActive) return;
          const links = document.querySelectorAll('.sn-item');
          links.forEach((l, j) => l.classList.toggle('active', j === i));
          if (isMobile) {
            const pill = links[i];
            const nav = document.querySelector('.seasons-nav');
            if (pill && nav) {
              const navRect = nav.getBoundingClientRect();
              const pillRect = pill.getBoundingClientRect();
              const scrollLeft = nav.scrollLeft + (pillRect.left - navRect.left) - (navRect.width / 2) + (pillRect.width / 2);
              nav.scrollTo({ left: scrollLeft, behavior: 'smooth' });
            }
          }
        }
      });
    });
  }
  </script>
