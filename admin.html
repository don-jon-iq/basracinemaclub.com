<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Basra Cinema Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --dark: #111111; --card: #161616; --border: #222222;
      --amber: #c85a00; --gold: #f0a500; --white: #f1f1f1; --muted: #666666;
      --danger: #c82020; --success: #1a8a2a;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', sans-serif;
      --pad: clamp(16px, 4vw, 40px);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: var(--font-body); font-size: 14px; line-height: 1.5; }

    /* Layout */
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 0 var(--pad); }
    .admin-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,8,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px var(--pad);
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-header h1 { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.06em; }
    .admin-header h1 em { color: var(--amber); font-style: normal; }

    /* Login */
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--card); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 380px; }
    .login-box h2 { font-family: var(--font-display); font-size: 32px; margin-bottom: 8px; letter-spacing: 0.04em; }
    .login-box h2 em { color: var(--amber); font-style: normal; }
    .login-box p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .login-error { color: var(--danger); font-size: 12px; margin-bottom: 12px; display: none; }

    /* Forms */
    label { display: block; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"], input[type="number"], textarea, select {
      width: 100%; padding: 10px 14px; background: var(--dark); border: 1px solid var(--border);
      color: var(--white); font-family: var(--font-body); font-size: 14px;
      margin-bottom: 16px; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--amber); }
    textarea { resize: vertical; min-height: 80px; }
    select { cursor: pointer; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border: 1px solid var(--border); background: var(--card);
      color: var(--white); font-family: var(--font-body); font-size: 12px;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--amber); color: var(--amber); }
    .btn-primary { background: var(--amber); border-color: var(--amber); color: #fff; }
    .btn-primary:hover { background: #a04d00; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 11px; }

    /* Dashboard */
    .dashboard { padding: 32px 0 60px; display: none; }
    .section-title {
      font-family: var(--font-display); font-size: 28px; letter-spacing: 0.04em;
      margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .section-title em { color: var(--amber); font-style: normal; }

    /* Season cards */
    .season-list { display: flex; flex-direction: column; gap: 16px; }
    .season-item {
      background: var(--card); border: 1px solid var(--border); padding: 20px;
      transition: border-color 0.2s;
    }
    .season-item:hover { border-color: rgba(200,90,0,0.3); }
    .season-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .season-item-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.04em; }
    .season-item-meta { font-size: 11px; color: var(--amber); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px; }
    .season-item-desc { color: rgba(241,241,241,0.5); font-size: 13px; margin-top: 8px; line-height: 1.6; }
    .season-item-actions { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }

    /* Film list inside season */
    .film-list { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
    .film-list-title { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .film-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid rgba(34,34,34,0.5);
    }
    .film-item:last-child { border-bottom: none; }
    .film-item-poster { width: 40px; height: 56px; object-fit: cover; flex-shrink: 0; filter: grayscale(0.3); background: var(--dark); }
    .film-item-info { flex: 1; min-width: 0; }
    .film-item-name { font-weight: 500; font-size: 14px; }
    .film-item-detail { font-size: 12px; color: var(--muted); }
    .film-item-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* Director items */
    .director-item {
      background: rgba(22,22,22,0.5); border: 1px solid rgba(34,34,34,0.5);
      padding: 14px; margin-top: 8px;
    }
    .director-item-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .director-item-name { font-family: var(--font-display); font-size: 18px; letter-spacing: 0.04em; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: var(--pad);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--dark); border: 1px solid var(--border);
      width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      padding: 28px;
    }
    .modal h3 { font-family: var(--font-display); font-size: 24px; letter-spacing: 0.04em; margin-bottom: 20px; }
    .modal h3 em { color: var(--amber); font-style: normal; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

    .file-input-wrap { position: relative; margin-bottom: 16px; }
    .file-input-wrap input[type="file"] { width: 100%; padding: 10px; background: var(--dark); border: 1px solid var(--border); color: var(--muted); }
    .file-preview { margin-top: 8px; max-width: 120px; max-height: 160px; object-fit: cover; display: none; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      padding: 12px 20px; background: var(--success); color: #fff;
      font-size: 13px; transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.error { background: var(--danger); }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* Responsive */
    @media (max-width: 600px) {
      .season-item-header { flex-direction: column; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h2>Admin <em>Login</em></h2>
      <p>Basra Cinema Club administration panel</p>
      <div id="loginError" class="login-error"></div>
      <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Login</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">
    <header class="admin-header">
      <h1>Basra <em>Admin</em></h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <a href="/Season.html" class="btn btn-sm" target="_blank">View Site</a>
        <button id="logoutBtn" class="btn btn-sm">Logout</button>
      </div>
    </header>
    <div class="admin-wrap dashboard" id="dashContent">
      <div class="section-title">
        <span>All <em>Seasons</em></span>
        <button class="btn btn-primary btn-sm" onclick="openSeasonModal()">+ New Season</button>
      </div>
      <div id="seasonList" class="season-list"></div>
    </div>
  </div>

  <!-- SEASON MODAL -->
  <div class="modal-overlay" id="seasonModal">
    <div class="modal">
      <h3 id="seasonModalTitle">New <em>Season</em></h3>
      <form id="seasonForm">
        <input type="hidden" id="seasonId">
        <label>Title</label>
        <input type="text" id="seasonTitleInput" required placeholder="e.g. Korean Cinema">
        <label>Country / Theme</label>
        <input type="text" id="seasonCountry" required placeholder="e.g. Korean Cinema">
        <label>Description</label>
        <textarea id="seasonDesc" required placeholder="Season description..."></textarea>
        <label>Type</label>
        <select id="seasonType">
          <option value="regular">Regular Season</option>
          <option value="director-retrospective">Director Retrospective</option>
        </select>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeModal('seasonModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FILM MODAL -->
  <div class="modal-overlay" id="filmModal">
    <div class="modal">
      <h3 id="filmModalTitle">Add <em>Film</em></h3>
      <form id="filmForm">
        <input type="hidden" id="filmId">
        <input type="hidden" id="filmSeasonId">
        <label>Title</label>
        <input type="text" id="filmTitle" required placeholder="Film title">
        <label>Director</label>
        <input type="text" id="filmDirector" required placeholder="Director name">
        <label>Year / Decade</label>
        <input type="text" id="filmYear" required placeholder="e.g. 1994 or 1990s">
        <label>Description</label>
        <textarea id="filmDescInput" required placeholder="Film description..."></textarea>
        <label>Poster Image</label>
        <div class="file-input-wrap">
          <input type="file" id="filmPoster" accept="image/*">
          <img id="filmPosterPreview" class="file-preview">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeModal('filmModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DIRECTOR MODAL -->
  <div class="modal-overlay" id="directorModal">
    <div class="modal">
      <h3 id="directorModalTitle">Add <em>Director</em></h3>
      <form id="directorForm">
        <input type="hidden" id="directorId">
        <input type="hidden" id="directorSeasonId">
        <label>Name</label>
        <input type="text" id="directorName" required placeholder="Director name">
        <label>Bio</label>
        <textarea id="directorBio" required placeholder="Director bio..."></textarea>
        <label>Portrait Image</label>
        <div class="file-input-wrap">
          <input type="file" id="directorPortrait" accept="image/*">
          <img id="directorPortraitPreview" class="file-preview">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeModal('directorModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DIRECTOR FILM MODAL -->
  <div class="modal-overlay" id="dirFilmModal">
    <div class="modal">
      <h3 id="dirFilmModalTitle">Add Director <em>Film</em></h3>
      <form id="dirFilmForm">
        <input type="hidden" id="dirFilmId">
        <input type="hidden" id="dirFilmDirectorId">
        <label>Title</label>
        <input type="text" id="dirFilmTitle" required placeholder="Film title">
        <label>Year</label>
        <input type="text" id="dirFilmYear" required placeholder="e.g. 2011">
        <label>Description</label>
        <textarea id="dirFilmDesc" required placeholder="Film description..."></textarea>
        <label>Poster Image</label>
        <div class="file-input-wrap">
          <input type="file" id="dirFilmPoster" accept="image/*">
          <img id="dirFilmPosterPreview" class="file-preview">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeModal('dirFilmModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
// ---- STATE ----
let token = localStorage.getItem('admin_token');
let seasons = [];

// ---- INIT ----
if (token) { showDashboard(); } else { showLogin(); }

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}
function showDashboard() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('dashContent').style.display = 'block';
  loadSeasons();
}

// ---- AUTH ----
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
    token = data.token;
    localStorage.setItem('admin_token', token);
    showDashboard();
  } catch { errEl.textContent = 'Connection error'; errEl.style.display = 'block'; }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  token = null;
  localStorage.removeItem('admin_token');
  showLogin();
});

// ---- API helpers ----
function authHeaders() { return { 'Authorization': 'Bearer ' + token }; }
function jsonAuth() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

async function apiFetch(url, opts) {
  const res = await fetch(url, opts);
  if (res.status === 401) { token = null; localStorage.removeItem('admin_token'); showLogin(); return null; }
  return res;
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

// ---- LOAD SEASONS ----
async function loadSeasons() {
  const res = await apiFetch('/api/seasons');
  if (!res) return;
  seasons = await res.json();
  renderSeasons();
}

function renderSeasons() {
  const list = document.getElementById('seasonList');
  if (seasons.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px;">No seasons yet. Create your first season above.</p>';
    return;
  }
  list.innerHTML = seasons.map(s => {
    const isRetro = s.type === 'director-retrospective';
    const seasonNum = ['One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten'][s.sort_order - 1] || s.sort_order;

    let filmsHtml = '';
    if (!isRetro && s.films && s.films.length > 0) {
      filmsHtml = `
        <div class="film-list">
          <div class="film-list-title">Films (${s.films.length})</div>
          ${s.films.map(f => `
            <div class="film-item">
              <img class="film-item-poster" src="${f.poster_image || ''}" alt="${esc(f.title)}" onerror="this.style.background='var(--dark)'">
              <div class="film-item-info">
                <div class="film-item-name">${esc(f.title)}</div>
                <div class="film-item-detail">${esc(f.director)} · ${esc(f.year_decade)}</div>
              </div>
              <div class="film-item-actions">
                <button class="btn btn-sm" onclick="openEditFilm(${f.id})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteFilm(${f.id})">Del</button>
              </div>
            </div>
          `).join('')}
        </div>`;
    }

    let directorsHtml = '';
    if (isRetro && s.directors && s.directors.length > 0) {
      directorsHtml = `
        <div class="film-list">
          <div class="film-list-title">Directors (${s.directors.length})</div>
          ${s.directors.map(d => `
            <div class="director-item">
              <div class="director-item-header">
                <div class="director-item-name">${esc(d.name)}</div>
                <div style="display:flex;gap:4px;">
                  <button class="btn btn-sm" onclick="openDirFilmModal(${d.id})">+ Film</button>
                  <button class="btn btn-sm" onclick="openEditDirector(${d.id})">Edit</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteDirector(${d.id})">Del</button>
                </div>
              </div>
              ${d.films && d.films.length > 0 ? d.films.map(df => `
                <div class="film-item" style="padding-left:8px;">
                  <img class="film-item-poster" src="${df.poster_image || ''}" alt="${esc(df.title)}" onerror="this.style.background='var(--dark)'" style="width:32px;height:44px;">
                  <div class="film-item-info">
                    <div class="film-item-name" style="font-size:13px;">${esc(df.title)} (${esc(df.year)})</div>
                  </div>
                  <div class="film-item-actions">
                    <button class="btn btn-sm" onclick="openEditDirFilm(${df.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteDirFilm(${df.id})">Del</button>
                  </div>
                </div>
              `).join('') : ''}
            </div>
          `).join('')}
        </div>`;
    }

    return `
      <div class="season-item">
        <div class="season-item-header">
          <div>
            <div class="season-item-meta">Season ${seasonNum} · ${esc(s.country)} · ${s.type}</div>
            <div class="season-item-title">${esc(s.title)}</div>
            <div class="season-item-desc">${esc(s.description)}</div>
          </div>
        </div>
        <div class="season-item-actions">
          ${!isRetro ? `<button class="btn btn-sm" onclick="openFilmModal(${s.id})">+ Film</button>` : ''}
          ${isRetro ? `<button class="btn btn-sm" onclick="openDirectorModal(${s.id})">+ Director</button>` : ''}
          <button class="btn btn-sm" onclick="openEditSeason(${s.id})">Edit Season</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSeason(${s.id})">Delete Season</button>
        </div>
        ${filmsHtml}
        ${directorsHtml}
      </div>`;
  }).join('');
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ---- MODALS ----
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function openSeasonModal() {
  document.getElementById('seasonModalTitle').innerHTML = 'New <em>Season</em>';
  document.getElementById('seasonId').value = '';
  document.getElementById('seasonTitleInput').value = '';
  document.getElementById('seasonCountry').value = '';
  document.getElementById('seasonDesc').value = '';
  document.getElementById('seasonType').value = 'regular';
  document.getElementById('seasonModal').classList.add('active');
}

function openEditSeason(id) {
  const s = seasons.find(x => x.id === id);
  if (!s) return;
  document.getElementById('seasonModalTitle').innerHTML = 'Edit <em>Season</em>';
  document.getElementById('seasonId').value = s.id;
  document.getElementById('seasonTitleInput').value = s.title;
  document.getElementById('seasonCountry').value = s.country;
  document.getElementById('seasonDesc').value = s.description;
  document.getElementById('seasonType').value = s.type;
  document.getElementById('seasonModal').classList.add('active');
}

function openFilmModal(seasonId) {
  document.getElementById('filmModalTitle').innerHTML = 'Add <em>Film</em>';
  document.getElementById('filmId').value = '';
  document.getElementById('filmSeasonId').value = seasonId;
  document.getElementById('filmTitle').value = '';
  document.getElementById('filmDirector').value = '';
  document.getElementById('filmYear').value = '';
  document.getElementById('filmDescInput').value = '';
  document.getElementById('filmPoster').value = '';
  document.getElementById('filmPosterPreview').style.display = 'none';
  document.getElementById('filmModal').classList.add('active');
}

function openEditFilm(id) {
  let film = null;
  for (const s of seasons) { film = (s.films || []).find(f => f.id === id); if (film) break; }
  if (!film) return;
  document.getElementById('filmModalTitle').innerHTML = 'Edit <em>Film</em>';
  document.getElementById('filmId').value = film.id;
  document.getElementById('filmSeasonId').value = film.season_id;
  document.getElementById('filmTitle').value = film.title;
  document.getElementById('filmDirector').value = film.director;
  document.getElementById('filmYear').value = film.year_decade;
  document.getElementById('filmDescInput').value = film.description;
  document.getElementById('filmPoster').value = '';
  const preview = document.getElementById('filmPosterPreview');
  if (film.poster_image) { preview.src = '/' + film.poster_image; preview.style.display = 'block'; }
  else { preview.style.display = 'none'; }
  document.getElementById('filmModal').classList.add('active');
}

function openDirectorModal(seasonId) {
  document.getElementById('directorModalTitle').innerHTML = 'Add <em>Director</em>';
  document.getElementById('directorId').value = '';
  document.getElementById('directorSeasonId').value = seasonId;
  document.getElementById('directorName').value = '';
  document.getElementById('directorBio').value = '';
  document.getElementById('directorPortrait').value = '';
  document.getElementById('directorPortraitPreview').style.display = 'none';
  document.getElementById('directorModal').classList.add('active');
}

function openEditDirector(id) {
  let dir = null;
  for (const s of seasons) { dir = (s.directors || []).find(d => d.id === id); if (dir) break; }
  if (!dir) return;
  document.getElementById('directorModalTitle').innerHTML = 'Edit <em>Director</em>';
  document.getElementById('directorId').value = dir.id;
  document.getElementById('directorSeasonId').value = dir.season_id;
  document.getElementById('directorName').value = dir.name;
  document.getElementById('directorBio').value = dir.bio;
  document.getElementById('directorPortrait').value = '';
  const preview = document.getElementById('directorPortraitPreview');
  if (dir.portrait_image) { preview.src = '/' + dir.portrait_image; preview.style.display = 'block'; }
  else { preview.style.display = 'none'; }
  document.getElementById('directorModal').classList.add('active');
}

function openDirFilmModal(directorId) {
  document.getElementById('dirFilmModalTitle').innerHTML = 'Add Director <em>Film</em>';
  document.getElementById('dirFilmId').value = '';
  document.getElementById('dirFilmDirectorId').value = directorId;
  document.getElementById('dirFilmTitle').value = '';
  document.getElementById('dirFilmYear').value = '';
  document.getElementById('dirFilmDesc').value = '';
  document.getElementById('dirFilmPoster').value = '';
  document.getElementById('dirFilmPosterPreview').style.display = 'none';
  document.getElementById('dirFilmModal').classList.add('active');
}

function openEditDirFilm(id) {
  let film = null;
  for (const s of seasons) {
    for (const d of (s.directors || [])) {
      film = (d.films || []).find(f => f.id === id); if (film) break;
    }
    if (film) break;
  }
  if (!film) return;
  document.getElementById('dirFilmModalTitle').innerHTML = 'Edit Director <em>Film</em>';
  document.getElementById('dirFilmId').value = film.id;
  document.getElementById('dirFilmDirectorId').value = film.director_id;
  document.getElementById('dirFilmTitle').value = film.title;
  document.getElementById('dirFilmYear').value = film.year;
  document.getElementById('dirFilmDesc').value = film.description;
  document.getElementById('dirFilmPoster').value = '';
  const preview = document.getElementById('dirFilmPosterPreview');
  if (film.poster_image) { preview.src = '/' + film.poster_image; preview.style.display = 'block'; }
  else { preview.style.display = 'none'; }
  document.getElementById('dirFilmModal').classList.add('active');
}

// ---- FILE PREVIEWS ----
['filmPoster', 'directorPortrait', 'dirFilmPoster'].forEach(id => {
  document.getElementById(id).addEventListener('change', function() {
    const previewId = id + 'Preview';
    const preview = document.getElementById(previewId);
    if (this.files && this.files[0]) {
      const reader = new FileReader();
      reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
      reader.readAsDataURL(this.files[0]);
    } else { preview.style.display = 'none'; }
  });
});

  if (!confirm('Delete this entire season and all its films?')) return;
  const res = await apiFetch(`/api/seasons/${id}`, { method: 'DELETE', headers: authHeaders() });
  if (res && res.ok) { toast('Season deleted'); loadSeasons(); }
}

// ---- CLOSE MODALS ON OVERLAY CLICK ----
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// ---- ESC to close modals ----
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
  }
});
